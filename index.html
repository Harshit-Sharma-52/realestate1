<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Harshit Property - Find Your Dream Home with professional real estate services. Browse properties, get expert advice, and make your dream home a reality.">
    <meta name="keywords" content="real estate, property, dream home, housing, buy property, sell property, Harshit Property">
    <meta name="author" content="Harshit Property">
    <meta property="og:title" content="Harshit Property - Find Your Dream Home">
    <meta property="og:description" content="Professional real estate services to help you find your perfect home.">
    <meta property="og:type" content="website">
    <title>Harshit Property - Find Your Dream Home</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- React CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        /* ===== CSS CUSTOM PROPERTIES ===== */
        :root {
            --primary: #e8a0bf;
            --primary-light: #f0c4d8;
            --primary-dark: #d481a3;
            --bg-blush: #FDF2F8;
            --accent-mauve: #9d4e7c;
            --accent-mauve-light: #b86a95;
            --text-dark: #2d2d2d;
            --text-light: #666666;
            --text-white: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.4);
            --shadow-light: rgba(0, 0, 0, 0.08);
            --shadow-medium: rgba(0, 0, 0, 0.15);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --border-radius: 16px;
            --container-width: 1400px;
            --header-height: 80px;
        }

        /* ===== DARK MODE VARIABLES ===== */
        [data-theme="dark"] {
            --primary: #e8a0bf;
            --primary-light: #f0c4d8;
            --primary-dark: #d481a3;
            --bg-blush: #1a1a2e;
            --accent-mauve: #b86a95;
            --accent-mauve-light: #d481a3;
            --text-dark: #f0f0f0;
            --text-light: #a0a0a0;
            --text-white: #ffffff;
            --glass-bg: rgba(30, 30, 50, 0.4);
            --glass-border: rgba(255, 255, 255, 0.15);
            --shadow-light: rgba(0, 0, 0, 0.3);
            --shadow-medium: rgba(0, 0, 0, 0.5);
        }

        /* ===== RESET & BASE STYLES ===== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-blush);
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
            transition: var(--transition);
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: var(--transition);
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        button {
            cursor: pointer;
            border: none;
            outline: none;
            font-family: inherit;
            transition: var(--transition);
        }

        input, textarea, select {
            font-family: inherit;
            outline: none;
            transition: var(--transition);
        }

        /* ===== CUSTOM CURSOR ===== */
        .custom-cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--primary);
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease;
            mix-blend-mode: difference;
        }

        .custom-cursor.hover {
            transform: scale(2);
            background: var(--accent-mauve);
        }

        /* ===== PRELOADER ===== */
        .preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-blush);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .preloader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid var(--primary-light);
            border-top: 4px solid var(--accent-mauve);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ===== GLASSMORPHISM UTILITY ===== */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius);
            box-shadow: 0 8px 32px var(--shadow-light);
        }

        /* ===== CONTAINER ===== */
        .container {
            max-width: var(--container-width);
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ===== SECTION SPACING ===== */
        section {
            padding: 100px 0;
        }

        /* ===== TYPOGRAPHY ===== */
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', serif;
            line-height: 1.2;
            color: var(--text-dark);
        }

        .section-title {
            font-size: clamp(2rem, 4vw, 3rem);
            text-align: center;
            margin-bottom: 16px;
            color: var(--text-dark);
        }

        .section-subtitle {
            text-align: center;
            color: var(--text-light);
            font-size: 1.1rem;
            margin-bottom: 60px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* ===== BUTTONS ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            border-radius: 50px;
            font-weight: 500;
            font-size: 1rem;
            transition: var(--transition);
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--accent-mauve));
            color: var(--text-white);
            box-shadow: 0 4px 15px rgba(232, 160, 191, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(232, 160, 191, 0.6);
        }

        .btn-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            color: var(--text-dark);
        }

        .btn-glass:hover {
            background: var(--primary);
            color: var(--text-white);
            border-color: var(--primary);
        }

        /* ===== HEADER / NAVIGATION ===== */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            z-index: 1000;
            transition: var(--transition);
        }

        .header.scrolled {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 4px 20px var(--shadow-light);
        }

        .header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100%;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent-mauve);
            z-index: 1001;
        }

        .logo span {
            color: var(--primary);
        }

        /* Hamburger Menu */
        .hamburger {
            display: flex;
            flex-direction: column;
            gap: 5px;
            background: none;
            padding: 10px;
            z-index: 1001;
        }

        .hamburger span {
            display: block;
            width: 28px;
            height: 3px;
            background: var(--text-dark);
            border-radius: 3px;
            transition: var(--transition);
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(6px, 6px);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(6px, -6px);
        }

        /* Mobile Navigation Overlay */
        .nav-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }

        .nav-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .nav-links {
            list-style: none;
            text-align: center;
        }

        .nav-links li {
            margin: 24px 0;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease;
        }

        .nav-overlay.active .nav-links li {
            opacity: 1;
            transform: translateY(0);
        }

        .nav-overlay.active .nav-links li:nth-child(1) { transition-delay: 0.1s; }
        .nav-overlay.active .nav-links li:nth-child(2) { transition-delay: 0.2s; }
        .nav-overlay.active .nav-links li:nth-child(3) { transition-delay: 0.3s; }
        .nav-overlay.active .nav-links li:nth-child(4) { transition-delay: 0.4s; }
        .nav-overlay.active .nav-links li:nth-child(5) { transition-delay: 0.5s; }
        .nav-overlay.active .nav-links li:nth-child(6) { transition-delay: 0.6s; }

        .nav-links a {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 600;
            color: var(--text-dark);
            transition: var(--transition);
            position: relative;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 3px;
            background: var(--primary);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* Dark Mode Toggle */
        .theme-toggle {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-dark);
            font-size: 0.9rem;
            z-index: 1001;
        }

        .theme-toggle i {
            font-size: 1.1rem;
        }

        /* ===== HERO SECTION ===== */
        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: linear-gradient(135deg, var(--bg-blush) 0%, var(--primary-light) 100%);
        }

        .hero-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 0 24px;
        }

        .hero-title {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            margin-bottom: 24px;
            color: var(--text-dark);
            animation: fadeInUp 1s ease;
        }

        .hero-title span {
            color: var(--accent-mauve);
        }

        .hero-description {
            font-size: clamp(1rem, 2vw, 1.3rem);
            color: var(--text-light);
            max-width: 700px;
            margin: 0 auto 40px;
            animation: fadeInUp 1s ease 0.2s both;
        }

        .hero-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeInUp 1s ease 0.4s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Parallax Layer */
        .parallax-layer {
            position: absolute;
            transition: transform 0.1s ease-out;
        }

        /* ===== MASONRY GRID ===== */
        .masonry-grid {
            display: column;
            columns: 3;
            column-gap: 24px;
            padding: 0 24px;
        }

        .masonry-item {
            break-inside: avoid;
            margin-bottom: 24px;
            border-radius: var(--border-radius);
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: var(--transition);
        }

        .masonry-item:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 40px var(--shadow-medium);
        }

        .masonry-item img {
            width: 100%;
            display: block;
        }

        .masonry-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 24px;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            color: white;
            transform: translateY(100%);
            transition: var(--transition);
        }

        .masonry-item:hover .masonry-overlay {
            transform: translateY(0);
        }

        /* ===== PROPERTY CARDS ===== */
        .property-card {
            background: white;
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: 0 4px 20px var(--shadow-light);
            transition: var(--transition);
        }

        [data-theme="dark"] .property-card {
            background: #2a2a3e;
        }

        .property-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 40px var(--shadow-medium);
        }

        .property-image {
            position: relative;
            height: 250px;
            overflow: hidden;
        }

        .property-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .property-card:hover .property-image img {
            transform: scale(1.1);
        }

        .property-badge {
            position: absolute;
            top: 16px;
            left: 16px;
            background: var(--primary);
            color: white;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .property-content {
            padding: 24px;
        }

        .property-price {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-mauve);
            margin-bottom: 8px;
        }

        .property-title {
            font-size: 1.2rem;
            margin-bottom: 8px;
            color: var(--text-dark);
        }

        .property-location {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .property-features {
            display: flex;
            gap: 20px;
            padding-top: 16px;
            border-top: 1px solid rgba(0,0,0,0.1);
        }

        [data-theme="dark"] .property-features {
            border-top-color: rgba(255,255,255,0.1);
        }

        .property-feature {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .property-feature i {
            color: var(--primary);
        }

        /* ===== STATISTICS COUNTER ===== */
        .stats-section {
            background: linear-gradient(135deg, var(--accent-mauve), var(--primary));
            padding: 80px 0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 40px;
            text-align: center;
        }

        .stat-item {
            color: white;
        }

        .stat-number {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 1rem;
            opacity: 0.9;
        }

        /* ===== TESTIMONIAL CAROUSEL ===== */
        .testimonial-carousel {
            position: relative;
            overflow: hidden;
            max-width: 800px;
            margin: 0 auto;
        }

        .testimonial-track {
            display: flex;
            transition: transform 0.5s ease;
        }

        .testimonial-slide {
            min-width: 100%;
            padding: 40px;
        }

        .testimonial-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius);
            padding: 40px;
            text-align: center;
        }

        .testimonial-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 20px;
            overflow: hidden;
            border: 3px solid var(--primary);
        }

        .testimonial-text {
            font-size: 1.1rem;
            color: var(--text-dark);
            font-style: italic;
            margin-bottom: 20px;
            line-height: 1.8;
        }

        .testimonial-author {
            font-weight: 600;
            color: var(--accent-mauve);
        }

        .testimonial-role {
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dark);
            font-size: 1.2rem;
            z-index: 10;
        }

        .carousel-btn:hover {
            background: var(--primary);
            color: white;
        }

        .carousel-prev { left: 10px; }
        .carousel-next { right: 10px; }

        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
        }

        .carousel-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--primary-light);
            border: none;
            cursor: pointer;
            transition: var(--transition);
        }

        .carousel-dot.active {
            background: var(--accent-mauve);
            transform: scale(1.2);
        }

        /* ===== FAQ ACCORDION ===== */
        .faq-item {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius);
            margin-bottom: 16px;
            overflow: hidden;
        }

        .faq-question {
            padding: 24px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 500;
            color: var(--text-dark);
            background: none;
            width: 100%;
            text-align: left;
            font-size: 1.1rem;
        }

        .faq-question i {
            color: var(--primary);
            transition: var(--transition);
        }

        .faq-item.active .faq-question i {
            transform: rotate(180deg);
        }

        .faq-answer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }

        .faq-item.active .faq-answer {
            max-height: 500px;
        }

        .faq-answer-content {
            padding: 0 24px 24px;
            color: var(--text-light);
            line-height: 1.8;
        }

        /* ===== CONTACT FORM ===== */
        .contact-form {
            max-width: 600px;
            margin: 0 auto;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius);
            padding: 40px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-dark);
        }

        .form-input, .form-textarea {
            width: 100%;
            padding: 14px 20px;
            border: 2px solid rgba(232, 160, 191, 0.3);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.5);
            color: var(--text-dark);
            font-size: 1rem;
        }

        [data-theme="dark"] .form-input,
        [data-theme="dark"] .form-textarea {
            background: rgba(30, 30, 50, 0.5);
        }

        .form-input:focus, .form-textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(232, 160, 191, 0.2);
        }

        .form-input.error {
            border-color: #e74c3c;
        }

        .form-error {
            color: #e74c3c;
            font-size: 0.85rem;
            margin-top: 6px;
            display: none;
        }

        .form-error.show {
            display: block;
        }

        .form-textarea {
            min-height: 150px;
            resize: vertical;
        }

        /* ===== NEWSLETTER FORM ===== */
        .newsletter-section {
            background: linear-gradient(135deg, var(--primary-light), var(--bg-blush));
            padding: 80px 0;
        }

        .newsletter-content {
            text-align: center;
            max-width: 600px;
            margin: 0 auto;
        }

        .newsletter-form {
            display: flex;
            gap: 12px;
            margin-top: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .newsletter-input {
            flex: 1;
            min-width: 280px;
            padding: 14px 24px;
            border: 2px solid rgba(232, 160, 191, 0.3);
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
            color: var(--text-dark);
        }

        [data-theme="dark"] .newsletter-input {
            background: rgba(30, 30, 50, 0.7);
        }

        .newsletter-input:focus {
            border-color: var(--primary);
        }

        /* ===== LIGHTBOX GALLERY ===== */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }

        .lightbox.active {
            opacity: 1;
            visibility: visible;
        }

        .lightbox-img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
        }

        .lightbox-close {
            position: absolute;
            top: 30px;

<body>
    <!-- Preloader -->
    <div id="preloader" class="preloader">
        <div class="loader"></div>
    </div>

    <!-- Custom Cursor -->
    <div id="custom-cursor" class="custom-cursor"></div>

    <!-- Root Element for React -->
    <div id="root"></div>

    <!-- React Application -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ===== PARTICLE CANVAS COMPONENT =====
        const ParticleCanvas = () => {
            const canvasRef = useRef(null);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let animationId;
                let particles = [];

                // Set canvas size
                const resizeCanvas = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                };
                resizeCanvas();
                window.addEventListener('resize', resizeCanvas);

                // Particle class
                class Particle {
                    constructor() {
                        this.x = Math.random() * canvas.width;
                        this.y = Math.random() * canvas.height;
                        this.size = Math.random() * 3 + 1;
                        this.speedX = Math.random() * 1 - 0.5;
                        this.speedY = Math.random() * 1 - 0.5;
                        this.opacity = Math.random() * 0.5 + 0.2;
                    }

                    update() {
                        this.x += this.speedX;
                        this.y += this.speedY;

                        if (this.x > canvas.width) this.x = 0;
                        if (this.x < 0) this.x = canvas.width;
                        if (this.y > canvas.height) this.y = 0;
                        if (this.y < 0) this.y = canvas.height;
                    }

                    draw() {
                        ctx.fillStyle = `rgba(232, 160, 191, ${this.opacity})`;
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                // Initialize particles
                for (let i = 0; i < 80; i++) {
                    particles.push(new Particle());
                }

                // Animation loop
                const animate = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    particles.forEach(particle => {
                        particle.update();
                        particle.draw();
                    });
                    animationId = requestAnimationFrame(animate);
                };
                animate();

                return () => {
                    cancelAnimationFrame(animationId);
                    window.removeEventListener('resize', resizeCanvas);
                };
            }, []);

            return <canvas ref={canvasRef} className="hero-canvas" />;
        };

        // ===== HEADER COMPONENT =====
        const Header = ({ isMenuOpen, setIsMenuOpen, theme, toggleTheme, currentPage, setCurrentPage }) => {
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => {
                    setScrolled(window.scrollY > 50);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const navItems = [
                { id: 'home', label: 'Home' },
                { id: 'about', label: 'About' },
                { id: 'properties', label: 'Properties' },
                { id: 'pro-listings', label: 'Pro Listings' },
                { id: 'services', label: 'Services' },
                { id: 'agents', label: 'Agents' },
                { id: 'neighborhoods', label: 'Neighborhoods' },
                { id: 'blog', label: 'Blog' },
                { id: 'contact', label: 'Contact' }
            ];

            return (
                <header className={`header ${scrolled ? 'scrolled' : ''}`}>
                    <div className="container">
                        <a href="#" className="logo" onClick={(e) => { e.preventDefault(); setCurrentPage('home'); }}>
                            Harshit <span>Property</span>
                        </a>

                        <button 
                            className={`hamburger ${isMenuOpen ? 'active' : ''}`}
                            onClick={() => setIsMenuOpen(!isMenuOpen)}
                            aria-label="Toggle navigation menu"
                        >
                            <span></span>
                            <span></span>
                            <span></span>
                        </button>

        const StatsSection = () => {
            const [counters, setCounters] = useState({
                properties: 0,
                clients: 0,
                years: 0,
                agents: 0
            });

            useEffect(() => {
                const targets = {
                    properties: 500,
                    clients: 1000,
                    years: 15,
                    agents: 50
                };

                const duration = 2000;
                const steps = 60;
                const interval = duration / steps;

                let step = 0;
                const timer = setInterval(() => {
                    step++;
                    const progress = step / steps;
                    const easeOut = 1 - Math.pow(1 - progress, 3);

                    setCounters({
                        properties: Math.floor(targets.properties * easeOut),
                        clients: Math.floor(targets.clients * easeOut),
                        years: Math.floor(targets.years * easeOut),
                        agents: Math.floor(targets.agents * easeOut)
                    });

                    if (step >= steps) {
                        clearInterval(timer);
                        setCounters(targets);
                    }
                }, interval);

                return () => clearInterval(timer);
            }, []);

            return (
                <section className="stats-section">
                    <div className="container">
                        <div className="stats-grid">
                            <div className="stat-item fade-in">

            const [formData, setFormData] = useState({

            });
            const [errors, setErrors] = useState({});
            const [submitted, setSubmitted] = useState(false);

            const validate = () => {
                const newErrors = {};
                if (!formData.name.trim()) newErrors.name = 'Name is required';
                if (!formData.email.trim()) {
                    newErrors.email = 'Email is required';
                } else if (!/\S+@\S+\.\S+/.test(formData.email)) {
                    newErrors.email = 'Email is invalid';
                }
                if (!formData.message.trim()) newErrors.message = 'Message is required';
                return newErrors;
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                const newErrors = validate();
                if (Object.keys(newErrors).length === 0) {
                    setSubmitted(true);
                    setTimeout(() => {
                        setSubmitted(false);
                        setFormData({ name: '', email: '', phone: '', message: '' });
                    }, 3000);
                } else {
                    setErrors(newErrors);
                }
            };

            const handleChange = (e) => {
                setFormData({ ...formData, [e.target.name]: e.target.value });
                if (errors[e.target.name]) {
                    setErrors({ ...errors, [e.target.name]: '' });
                }
            };

            return (

        const App = () => {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [theme, setTheme] = useState('light');
            const [currentPage, setCurrentPage] = useState('home');
            const [showBackToTop, setShowBackToTop] = useState(false);

            // Theme toggle
            const toggleTheme = () => {
                const newTheme = theme === 'light' ? 'dark' : 'light';
                setTheme(newTheme);
                document.documentElement.setAttribute('data-theme', newTheme);
            };

            // Scroll handler for back to top button
            useEffect(() => {
                const handleScroll = () => {
                    setShowBackToTop(window.scrollY > 500);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            // Custom cursor
            useEffect(() => {
                const cursor = document.getElementById('custom-cursor');
                if (!cursor) return;

                const handleMouseMove = (e) => {
                    cursor.style.left = e.clientX + 'px';
                    cursor.style.top = e.clientY + 'px';
                };

                const handleMouseEnter = () => cursor.classList.add('hover');
                const handleMouseLeave = () => cursor.classList.remove('hover');

                document.addEventListener('mousemove', handleMouseMove);

                const interactiveElements = document.querySelectorAll('a, button, .property-card, .masonry-item');
                interactiveElements.forEach(el => {
                    el.addEventListener('mouseenter', handleMouseEnter);
                    el.addEventListener('mouseleave', handleMouseLeave);
                });

                return () => {
                    document.removeEventListener('mousemove', handleMouseMove);
                };
            }, [currentPage]);

            // Scroll fade-in animations
            useEffect(() => {
                const observer = new IntersectionObserver(
                    (entries) => {
                        entries.forEach(entry => {
                            if (entry.isIntersecting) {
                                entry.target.classList.add('visible');
                            }
                        });
                    },
                    { threshold: 0.1 }
                );

                setTimeout(() => {
                    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
                }, 100);

                return () => observer.disconnect();
            }, [currentPage]);

            // Preloader
            useEffect(() => {
                const preloader = document.getElementById('preloader');
                if (preloader) {
                    setTimeout(() => {
                        preloader.classList.add('hidden');
                    }, 1500);
                }
            }, []);

            // Set theme on load
            useEffect(() => {
                document.documentElement.setAttribute('data-theme', theme);
            }, []);

            const scrollToTop = () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            return (
                <>
                    <Header
                        isMenuOpen={isMenuOpen}
                        setIsMenuOpen={setIsMenuOpen}
                        theme={theme}
                        toggleTheme={toggleTheme}
                        currentPage={currentPage}
                        setCurrentPage={setCurrentPage}
                    />

                    {/* Home Page */}
                    {currentPage === 'home' && (
                        <div className="page active">
                            <HeroSection />
                            <DreamHomeQuiz />
                            <StatsSection />
                            <FeaturedProperties />
                            <MarketTrends />
                            <TestimonialCarousel />
                            <MasonryGallery />
                            <FAQSection />
                            <ContactSection />
                            <NewsletterSection />
                            <MapSection />
                        </div>
                    )}

                    {/* About Page */}
                    {currentPage === 'about' && <AboutPage />}

                    {/* Properties Page */}
                    {currentPage === 'properties' && <PropertiesPage />}

                    {/* Pro Listings Page */}
                    {currentPage === 'pro-listings' && <ProListingsPage />}

                    {/* Services Page */}
                    {currentPage === 'services' && <ServicesPage />}

                    {/* Agents Page */}
                    {currentPage === 'agents' && <AgentsPage />}

                    {/* Neighborhoods Page */}
                    {currentPage === 'neighborhoods' && <NeighborhoodsPage />}

                    {/* Blog Page */}
                    {currentPage === 'blog' && <BlogPage />}

                    {/* Contact Page */}
                    {currentPage === 'contact' && (
                        <div className="page active" style={{ paddingTop: 'var(--header-height)' }}>
                            <ContactSection />
                            <MapSection />
                        </div>
                    )}

                    <Footer />

                    {/* Back to Top Button */}
                    <button
                        className={`back-to-top ${showBackToTop ? 'visible' : ''}`}
                        onClick={scrollToTop}
                        aria-label="Back to top"
                    >
                        <i className="fas fa-chevron-up"></i>
                    </button>

                    {/* Sticky CTA Button */}
                    <a href="#" className="sticky-cta" onClick={(e) => { e.preventDefault(); setCurrentPage('contact'); }}>
                        <i className="fas fa-phone"></i>
                        <span>Schedule a Call</span>
                    </a>

                    {/* WhatsApp Widget */}
                    <WhatsAppWidget />
                </>
            );
        };

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Harshit Property - Find Your Dream Home with professional real estate services. Browse properties, get expert advice, and make your dream home a reality.">
    <meta name="keywords" content="real estate, property, dream home, housing, buy property, sell property, Harshit Property">
    <meta name="author" content="Harshit Property">
    <meta property="og:title" content="Harshit Property - Find Your Dream Home">
    <meta property="og:description" content="Professional real estate services to help you find your perfect home.">
    <meta property="og:type" content="website">
    <title>Harshit Property - Find Your Dream Home</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- React CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        /* ===== CSS CUSTOM PROPERTIES ===== */
        :root {
            --primary: #932051;
            --primary: #209385;
            --primary: #2a3561;
            --primary-light: #881147;
            --primary: #932051;
            --primary-dark: #98114a;
            --bg-blush: #FDF2F8;
            --accent-mauve: #78104d;
            --accent-mauve-light: #b86a95;
            --text-dark: #0a0909;
            --text-light: #100f0f;
            --text-white: #ffffff;
            --glass-bg: rgba(232, 205, 218, 0.751);
            --glass-border: rgba(172, 15, 122, 0.868);
            --shadow-light: rgba(0, 0, 0, 0.08);
            --shadow-medium: rgba(0, 0, 0, 0.15);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --border-radius: 10px;
            --container-width: 1400px;
            --header-height: 80px;
        }

        /* ===== DARK MODE VARIABLES ===== */
        [data-theme="dark"] {
            --primary: #1a9e7b;
            --primary:  #900d42;
            --primary-light: #3a9350;
            --primary-dark: #000000dd;
            --bg-blush: #aaaaae;
            --accent-mauve: #c41212;
            --accent-mauve-light: #c99191;
            --text-dark: #fcf0f0;
            --text-light: #fcfdfd;
            --text-white: #d2cbcb;
            --glass-bg: rgba(52, 50, 105, 0.892);
            --glass-border: rgba(201, 15, 77, 0.848);
            --shadow-light: rgba(0, 0, 0, 0.3);
            --shadow-medium: rgba(8, 119, 29, 0.5);
        }

        /* ===== RESET & BASE STYLES ===== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-blush);
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
            transition: var(--transition);
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: var(--transition);
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        button {
            cursor: pointer;
            border: none;
            outline: none;
            font-family: inherit;
            transition: var(--transition);
        }

        input, textarea, select {
            font-family: inherit;
            outline: none;
            transition: var(--transition);
        }

        /* ===== CUSTOM CURSOR ===== */
     
        /* ===== PRELOADER ===== */
        .preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-blush);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .preloader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid var(--primary-light);
            border-top: 4px solid var(--accent-mauve);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ===== GLASSMORPHISM UTILITY ===== */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius);
            box-shadow: 0 8px 32px var(--shadow-light);
        }

        /* ===== CONTAINER ===== */
        .container {
            max-width: var(--container-width);
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ===== SECTION SPACING ===== */
        section {
            padding: 40px 0;
        }

        /* ===== TYPOGRAPHY ===== */
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', serif;
            line-height: 1.2;
            color: var(--text-dark);
        }

        .section-title {
            font-size: clamp(2rem, 4vw, 3rem);
            text-align: center;
            margin-bottom: 16px;
            color: var(--text-dark);
        }

        .section-subtitle {
            text-align: center;
            color: var(--text-light);
            font-size: 1.1rem;
            margin-bottom: 35px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* ===== BUTTONS ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            border-radius: 50px;
            font-weight: 500;
            font-size: 1rem;
            transition: var(--transition);
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--accent-mauve));
            color: var(--text-white);
            box-shadow: 0 4px 15px rgba(232, 160, 191, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(232, 160, 191, 0.6);
        }

        .btn-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            color: var(--text-dark);
        }

        .btn-glass:hover {
            background: var(--primary);
            color: var(--text-white);
            border-color: var(--primary);
        }

        /* ===== HEADER / NAVIGATION ===== */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            z-index: 1000;
            transition: var(--transition);
            background-color: #d2c6ce;
        }

        .header.scrolled {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 4px 20px var(--shadow-light);
        }

        .header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100%;
        }

        .logo {
            display: flex;
            align-items: center;
            z-index: 1001;
            line-height: 1;
        }

        /* Hamburger Menu */
        .hamburger {
            display: flex;
            flex-direction: column;
            gap: 5px;
            background: none;
            border: none;
            padding: 10px;
            z-index: 10001;
            cursor: pointer;
        }

        .hamburger span {
            display: block;
            width: 28px;
            height: 3px;
            background: var(--text-dark);
            border-radius: 3px;
            transition: var(--transition);
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(6px, 6px);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(6px, -6px);
        }

        /* Mobile Navigation Overlay */
        /* ===== NAVIGATION PAGE ===== */
        .nav-overlay {
            position: fixed;
            top: var(--header-height);
            left: 0;
            width: 100%;
            height: calc(100% - var(--header-height));
            background: var(--bg-blush);
            z-index: 999;
            display: flex;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .nav-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .nav-overlay-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            width: 100%;
            height: 100%;
            padding: 30px 20px 20px;
            overflow-y: auto;
        }

        .nav-links {
            list-style: none;
            text-align: center;
        }

        .nav-links li {
            margin: 5px 0;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.4s ease;
        }

        .nav-overlay.active .nav-links li {
            opacity: 1;
            transform: translateY(0);
        }

        .nav-overlay.active .nav-links li:nth-child(1) { transition-delay: 0.05s; }
        .nav-overlay.active .nav-links li:nth-child(2) { transition-delay: 0.1s; }
        .nav-overlay.active .nav-links li:nth-child(3) { transition-delay: 0.15s; }
        .nav-overlay.active .nav-links li:nth-child(4) { transition-delay: 0.2s; }
        .nav-overlay.active .nav-links li:nth-child(5) { transition-delay: 0.25s; }
        .nav-overlay.active .nav-links li:nth-child(6) { transition-delay: 0.3s; }
        .nav-overlay.active .nav-links li:nth-child(7) { transition-delay: 0.35s; }
        .nav-overlay.active .nav-links li:nth-child(8) { transition-delay: 0.4s; }
        .nav-overlay.active .nav-links li:nth-child(9) { transition-delay: 0.45s; }

        .nav-links a {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--text-dark);
            transition: color 0.3s ease;
            display: inline-block;
            padding: 2px 0;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        /* Dark Mode Toggle */
        .theme-toggle {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-dark);
            font-size: 0.9rem;
            z-index: 1001;
        }

        .theme-toggle i {
            font-size: 1.1rem;
        }

        /* ===== HERO SECTION ===== */
        .hero {
            position: relative;
            height: 70vh;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 0;
            background: linear-gradient(135deg, var(--bg-blush) 0%, var(--primary-light) 100%);
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 0 24px;
        }

        .hero-title {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            margin-bottom: 16px;
            color: var(--text-dark);
            animation: fadeInUp 1s ease;
        }

        .hero-title span {
            color: var(--accent-mauve);
        }

        .hero-description {
            font-size: clamp(1rem, 2vw, 1.3rem);
            color: var(--text-light);
            max-width: 700px;
            margin: 0 auto 24px;
            animation: fadeInUp 1s ease 0.2s both;
        }

        .hero-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeInUp 1s ease 0.4s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Parallax Layer */
        .parallax-layer {
            position: absolute;
            transition: transform 0.1s ease-out;
        }

        /* ===== MASONRY GRID ===== */
        .masonry-grid {
            display: column;
            columns: 3;
            column-gap: 30px;
        }

        .masonry-item {
            break-inside: avoid;
            margin-bottom: 30px;
            border-radius: var(--border-radius);
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: var(--transition);
        }

        .masonry-item:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 40px var(--shadow-medium);
        }

        .masonry-item img {
            width: 100%;
            display: block;
        }

        .masonry-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 24px;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            color: white;
            /* transform: translateY(100%); */
            transition: var(--transition);
        }

        /* .masonry-item:hover .masonry-overlay {
            transform: translateY(0);
        } */

        /* ===== PROPERTY CARDS ===== */
        .property-card {
            background: white;
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: 0 4px 20px var(--shadow-light);
            transition: var(--transition);
        }

        [data-theme="dark"] .property-card {
            background: #2a2a3e;
        }

        .property-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 40px var(--shadow-medium);
        }

        .property-image {
            position: relative;
            height: 320px;
            overflow: hidden;
        }

        .property-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .property-card:hover .property-image img {
            transform: scale(1.1);
        }

        .property-badge {
            position: absolute;
            top: 16px;
            left: 16px;
            background: var(--primary);
            color: white;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .property-content {
            padding: 30px;
        }

        .property-price {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-mauve);
            margin-bottom: 8px;
        }

        .property-title {
            font-size: 1.2rem;
            margin-bottom: 8px;
            color: var(--text-dark);
        }

        .property-location {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .property-features {
            display: flex;
            gap: 20px;
            padding-top: 16px;
            border-top: 1px solid rgba(0,0,0,0.1);
        }

        [data-theme="dark"] .property-features {
            border-top-color: rgba(255,255,255,0.1);
        }

        .property-feature {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .property-feature i {
            color: var(--primary);
        }

        /* ===== STATISTICS COUNTER ===== */
        .stats-section {
            background: linear-gradient(135deg, var(--accent-mauve), var(--primary));
            padding: 50px 0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 40px;
            text-align: center;
        }

        .stat-item {
            color: white;
        }

        .stat-number {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 1rem;
            opacity: 0.9;
        }

        /* ===== TESTIMONIAL CAROUSEL ===== */
        .testimonial-carousel {
            position: relative;
            overflow: hidden;
            max-width: 920px;
            margin: 0 auto;
        }

        .testimonial-track {
            display: flex;
            transition: transform 0.5s ease;
        }

        .testimonial-slide {
            min-width: 100%;
            padding: 40px;
        }

        .testimonial-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius);
            padding: 50px 45px;
            text-align: center;
        }

        .testimonial-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin: 0 auto 24px;
            overflow: hidden;
            border: 3px solid var(--primary);
        }

        .testimonial-text {
            font-size: 1.2rem;
            color: var(--text-dark);
            font-style: italic;
            margin-bottom: 24px;
            line-height: 1.9;
        }

        .testimonial-author {
            font-weight: 600;
            color: var(--accent-mauve);
        }

        .testimonial-role {
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dark);
            font-size: 1.2rem;
            z-index: 10;
        }

        .carousel-btn:hover {
            background: var(--primary);
            color: white;
        }

        .carousel-prev { left: 10px; }
        .carousel-next { right: 10px; }

        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
        }

        .carousel-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--primary-light);
            border: none;
            cursor: pointer;
            transition: var(--transition);
        }

        .carousel-dot.active {
            background: var(--accent-mauve);
            transform: scale(1.2);
        }

        /* ===== FAQ ACCORDION ===== */
        .faq-item {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius);
            margin-bottom: 16px;
            overflow: hidden;
        }

        .faq-question {
            padding: 24px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 500;
            color: var(--text-dark);
            background: none;
            width: 100%;
            text-align: left;
            font-size: 1.1rem;
        }

        .faq-question i {
            color: var(--primary);
            transition: var(--transition);
        }

        .faq-item.active .faq-question i {
            transform: rotate(180deg);
        }

        .faq-answer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }

        .faq-item.active .faq-answer {
            max-height: 500px;
        }

        .faq-answer-content {
            padding: 0 24px 24px;
            color: var(--text-light);
            line-height: 1.8;
        }

        /* ===== CONTACT FORM ===== */
        .contact-form {
            max-width: 600px;
            margin: 0 auto;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius);
            padding: 40px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-dark);
        }

        .form-input, .form-textarea {
            width: 100%;
            padding: 14px 20px;
            border: 2px solid rgba(232, 160, 191, 0.3);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.5);
            color: var(--text-dark);
            font-size: 1rem;
        }

        [data-theme="dark"] .form-input,
        [data-theme="dark"] .form-textarea {
            background: rgba(30, 30, 50, 0.5);
        }

        .form-input:focus, .form-textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(232, 160, 191, 0.2);
        }

        .form-input.error {
            border-color: #e74c3c;
        }

        .form-error {
            color: #e74c3c;
            font-size: 0.85rem;
            margin-top: 6px;
            display: none;
        }

        .form-error.show {
            display: block;
        }

        .form-textarea {
            min-height: 150px;
            resize: vertical;
        }

        /* ===== NEWSLETTER FORM ===== */
        .newsletter-section {
            background: linear-gradient(135deg, var(--primary-light), var(--bg-blush));
            padding: 50px 0;
        }

        .newsletter-content {
            text-align: center;
            max-width: 600px;
            margin: 0 auto;
        }

        .newsletter-form {
            display: flex;
            gap: 12px;
            margin-top: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .newsletter-input {
            flex: 1;
            min-width: 280px;
            padding: 14px 24px;
            border: 2px solid rgba(232, 160, 191, 0.3);
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
            color: var(--text-dark);
        }

        [data-theme="dark"] .newsletter-input {
            background: rgba(30, 30, 50, 0.7);
        }

        .newsletter-input:focus {
            border-color: var(--primary);
        }

        /* ===== LIGHTBOX GALLERY ===== */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }

        .lightbox.active {
            opacity: 1;
            visibility: visible;
        }

        .lightbox-img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 8px;
        }

        .lightbox-close {
            position: absolute;
            top: 30px;
            right: 30px;
            background: none;
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);

        const StatsSection = () => {
            const [counters, setCounters] = useState({
                properties: 0,
                clients: 0,
                years: 0,
                agents: 0
            });

            useEffect(() => {
                const targets = {
                    properties: 500,
                    clients: 1000,
                    years: 15,
                    agents: 50
                };

                const duration = 2000;
                const steps = 60;
                const interval = duration / steps;

                let step = 0;
                const timer = setInterval(() => {
                    step++;
                    const progress = step / steps;
                    const easeOut = 1 - Math.pow(1 - progress, 3);

                    setCounters({
                        properties: Math.floor(targets.properties * easeOut),
                        clients: Math.floor(targets.clients * easeOut),
                        years: Math.floor(targets.years * easeOut),
                        agents: Math.floor(targets.agents * easeOut)
                    });

                    if (step >= steps) {
                        clearInterval(timer);
                        setCounters(targets);
                    }
                }, interval);

                return () => clearInterval(timer);
            }, []);

            return (
                <section className="stats-section">
                    <div className="container">
                        <div className="stats-grid">
                            <div className="stat-item fade-in">
                                <div className="stat-number">{counters.properties}+</div>

        const ContactSection = () => {
            const [formData, setFormData] = useState({
                name: '',
                email: '',
                phone: '',
                message: ''
            });
            const [errors, setErrors] = useState({});
            const [submitted, setSubmitted] = useState(false);

            const validate = () => {
                const newErrors = {};
                if (!formData.name.trim()) newErrors.name = 'Name is required';
                if (!formData.email.trim()) {
                    newErrors.email = 'Email is required';
                } else if (!/\S+@\S+\.\S+/.test(formData.email)) {
                    newErrors.email = 'Email is invalid';
                }
                if (!formData.message.trim()) newErrors.message = 'Message is required';
                return newErrors;
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                const newErrors = validate();
                if (Object.keys(newErrors).length === 0) {
                    setSubmitted(true);
                    setTimeout(() => {
                        setSubmitted(false);
                        setFormData({ name: '', email: '', phone: '', message: '' });
                    }, 3000);
                } else {
                    setErrors(newErrors);
                }
            };

            const handleChange = (e) => {
                setFormData({ ...formData, [e.target.name]: e.target.value });
                if (errors[e.target.name]) {
                    setErrors({ ...errors, [e.target.name]: '' });
                }

            return (

        const DreamHomeQuiz = () => {
            const [answers, setAnswers] = useState({});
            const [showResult, setShowResult] = useState(false);

            const questions = [
                {
                    id: 'budget',
                    question: 'What is your budget range?',

                    options: ['Single Family', 'Condo/Apartment', 'Luxury Villa', 'Penthouse']
                },
                {
                    id: 'location',
                    question: 'Preferred location type?',
                    options: ['City Center', 'Suburban', 'Waterfront', 'Mountain View']
                }
            ];

            const handleAnswer = (questionId, option) => {
                setAnswers({...answers, [questionId]: option});
            };

            const getRecommendation = () => {
                const budget = answers.budget || '';
                if (budget.includes('₹5M')) return 'Luxury Villa in Beverly Hills';
                if (budget.includes('₹2M')) return 'Waterfront Penthouse in Miami';
                if (budget.includes('₹1M')) return 'Modern Family Home in Austin';
                return 'Cozy Apartment in Downtown';
            };

            return (
                <section style={{ padding: '50px 0', background: 'var(--bg-blush)' }}>

                                <div key={q.id} className="quiz-question">

                                    <div className="quiz-options">
                                        {q.options.map((opt) => (
                                            <div
                                                key={opt}
                                                className={`quiz-option ${answers[q.id] === opt ? 'selected' : ''}`}

                                                    <i className="fas fa-file-contract"></i> Request Docs
                                                </button>
                                            </div>
                                            {showPremium[property.id] && (
                                                <div style={{ marginTop: '20px', padding: '20px', background: 'rgba(232, 160, 191, 0.1)', borderRadius: '12px', textAlign: 'center' }}>
                                                    <i className="fas fa-vr-cardboard" style={{ fontSize: '2rem', color: 'var(--accent-mauve)', marginBottom: '10px', display: 'block' }}></i>
                                                    <p style={{ color: 'var(--text-light)' }}>Virtual tour would launch here with 360° interactive experience</p>
                                                </div>
                                            )}
                                            <p style={{ marginTop: '15px', fontSize: '0.9rem', color: 'var(--text-light)' }}>
                                                <i className="fas fa-user" style={{ marginRight: '6px', color: 'var(--primary)' }}></i>
                                                Agent: {property.agent}
                                            </p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>
                </div>
            );
        };


// ===== AGENTS PAGE =====
        const AgentsPage = () => {
            const agents = [
                { name: "Priya Sharma", title: "Senior Real Estate Agent", bio: "With over 10 years of experience, Priya specializes in luxury properties and has closed over 500 deals.", image: "https://i.pravatar.cc/300?img=1" },
                { name: "Rahul Verma", title: "Property Consultant", bio: "Rahul is an expert in residential properties and helps first-time homebuyers find their perfect home.", image: "https://i.pravatar.cc/300?img=11" },
                { name: "Anjali Patel", title: "Luxury Home Specialist", bio: "Anjali focuses on high-end luxury properties and provides personalized service to discerning clients.", image: "https://i.pravatar.cc/300?img=5" },
                { name: "Vikram Singh", title: "Commercial Real Estate Agent", bio: "Vikram specializes in commercial properties and investment opportunities across the city.", image: "https://i.pravatar.cc/300?img=12" }
            ];

            return (
                <div className="page active" style={{ paddingTop: 'var(--header-height)' }}>
                    <section className="about-hero">
                        <div className="container">
                            <h1 className="section-title fade-in">Our Agents</h1>
                            <p className="section-subtitle fade-in">Meet our team of experienced real estate professionals</p>
                        </div>
                    </section>
                    <section style={{ padding: '60px 0' }}>
                        <div className="container" style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))', gap: '30px' }}>
                            {agents.map((agent, index) => (
                                <div key={index} className="agent-card fade-in">
                                    <div className="agent-avatar">
                                        <img src={agent.image} alt={agent.name} loading="lazy" />
                                    </div>
                                    <h3 className="agent-name">{agent.name}</h3>
                                    <p className="agent-title">{agent.title}</p>
                                    <p className="agent-bio">{agent.bio}</p>
                                </div>
                            ))}
                        </div>
                    </section>
                </div>
            );
        };


 // ===== WHATSAPP WIDGET COMPONENT =====
        const WhatsAppWidget = () => {
            const handleWhatsApp = () => {
                window.open("https://wa.me/919760971378?text=Hi%20Harshit%20Property,%20I'm%20interested%20in%20finding%20my%20dream%20home.", "_blank");
            };

            return (
                <div className="whatsapp-widget">
                    <button
                        className="whatsapp-btn"
                        onClick={handleWhatsApp}
                        aria-label="Chat on WhatsApp"
                    >
                        <i className="fab fa-whatsapp"></i>
                    </button>
                </div>
            );
        };


        const App = () => {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [theme, setTheme] = useState('light');
            const [currentPage, setCurrentPage] = useState('home');
            const [showBackToTop, setShowBackToTop] = useState(false);

            // Theme toggle
            const toggleTheme = () => {
                const newTheme = theme === 'light' ? 'dark' : 'light';
                setTheme(newTheme);
                document.documentElement.setAttribute('data-theme', newTheme);
            };

            // Scroll to top on page change
            useEffect(() => {
                window.scrollTo(0, 0);
            }, [currentPage]);

            // Disable browser scroll restoration
            useEffect(() => {
                if ('scrollRestoration' in history) {
                    history.scrollRestoration = 'manual';
                }
            }, []);

            // Lock body scroll when menu is open
            useEffect(() => {
                document.body.style.overflow = isMenuOpen ? 'hidden' : '';
                return () => { document.body.style.overflow = ''; };
            }, [isMenuOpen]);

            // Scroll handler for back to top button
            useEffect(() => {
                const handleScroll = () => {
                    setShowBackToTop(window.scrollY > 500);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            // Custom cursor
            useEffect(() => {
                const cursor = document.getElementById('custom-cursor');
                if (!cursor) return;

                const handleMouseMove = (e) => {
                    cursor.style.left = e.clientX + 'px';
                    cursor.style.top = e.clientY + 'px';
                };

                const handleMouseEnter = () => cursor.classList.add('hover');
                const handleMouseLeave = () => cursor.classList.remove('hover');

                document.addEventListener('mousemove', handleMouseMove);

                const interactiveElements = document.querySelectorAll('a, button, .property-card, .masonry-item');
                interactiveElements.forEach(el => {
                    el.addEventListener('mouseenter', handleMouseEnter);
                    el.addEventListener('mouseleave', handleMouseLeave);
                });

                return () => {
                    document.removeEventListener('mousemove', handleMouseMove);
                };
            }, [currentPage]);

            // Scroll fade-in animations
            useEffect(() => {
                const observer = new IntersectionObserver(
                    (entries) => {
                        entries.forEach(entry => {
                            if (entry.isIntersecting) {
                                entry.target.classList.add('visible');
                            }
                        });
                    },
                    { threshold: 0.1 }
                );

                setTimeout(() => {
                    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
                }, 100);

                return () => observer.disconnect();
            }, [currentPage]);

            // Preloader
            useEffect(() => {
                const preloader = document.getElementById('preloader');
                if (preloader) {
                    setTimeout(() => {
                        preloader.classList.add('hidden');
                    }, 1500);
                }
            }, []);

            // Set theme on load
            useEffect(() => {
                document.documentElement.setAttribute('data-theme', theme);
            }, []);

            const scrollToTop = () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            return (
                <>
                    <Header
                        isMenuOpen={isMenuOpen}
                        setIsMenuOpen={setIsMenuOpen}
                        theme={theme}
                        toggleTheme={toggleTheme}
                        currentPage={currentPage}
                        setCurrentPage={setCurrentPage}
                    />

                    {/* Navigation Overlay */}
                    <div className={`nav-overlay ${isMenuOpen ? 'active' : ''}`}>
                        <div className="nav-overlay-content">
                            <ul className="nav-links">
                                {navItems.map(item => (
                                    <li key={item.id}>
                                        <a 
                                            href="#" 
                                            className={currentPage === item.id ? 'active' : ''}
                                            onClick={(e) => {
                                                e.preventDefault();
                                                window.scrollTo(0, 0);
                                                setCurrentPage(item.id);
                                                setIsMenuOpen(false);
                                            }}
                                        >
                                            {item.label}
                                        </a>
                                    </li>
                                ))}
                            </ul>
                            <div className="overlay-social">
                                <a href="#" className="social-icon" aria-label="Facebook">
                                    <i className="fab fa-facebook-f"></i>
                                </a>
                                <a href="#" className="social-icon" aria-label="Instagram">
                                    <i className="fab fa-instagram"></i>
                                </a>
                                <a href="#" className="social-icon" aria-label="Twitter">
                                    <i className="fab fa-twitter"></i>
                                </a>
                                <a href="#" className="social-icon" aria-label="LinkedIn">
                                    <i className="fab fa-linkedin-in"></i>
                                </a>
                            </div>
                        </div>
                    </div>

                    {/* Home Page */}
                    {currentPage === 'home' && (
                        <div className="page active">
                            <HeroSection setCurrentPage={setCurrentPage} />
                            <DreamHomeQuiz />
                            <StatsSection />
                            <FeaturedProperties />
                            <MasonryGallery />
                            <MarketTrends />
                            <TestimonialCarousel />                          
                            <FAQSection />
                            <ContactSection />
                            <NewsletterSection />
                            <MapSection />
                        </div>
                    )}

                    {/* About Page */}
                    {currentPage === 'about' && <AboutPage />}

                    {/* Properties Page */}
                    {currentPage === 'properties' && <PropertiesPage />}

                    {/* Pro Listings Page */}
                    {currentPage === 'pro-listings' && <ProListingsPage />}

                    {/* Services Page */}
                    {currentPage === 'services' && <ServicesPage />}

                    {/* Agents Page */}
                    {currentPage === 'agents' && <AgentsPage />}

                    {/* Neighborhoods Page */}
                    {currentPage === 'neighborhoods' && <NeighborhoodsPage />}

                    {/* Blog Page */}
                    {currentPage === 'blog' && <BlogPage />}

                    {/* Contact Page */}
                    {currentPage === 'contact' && (
                        <div className="page active" style={{ paddingTop: 'var(--header-height)' }}>
                            <ContactSection />
                            <MapSection />
                        </div>
                    )}

                    <Footer setCurrentPage={setCurrentPage} />

                    {/* Back to Top Button */}
                    <button
                        className={`back-to-top ${showBackToTop ? 'visible' : ''}`}
                        onClick={scrollToTop}
                        aria-label="Back to top"
                    >
                        <i className="fas fa-chevron-up"></i>
                    </button>

                    {/* Sticky CTA Button */}
                    <a href="#" className="sticky-cta" onClick={(e) => { e.preventDefault(); window.scrollTo(0, 0); setCurrentPage('contact'); }}>
                        <i className="fas fa-phone"></i>
                        <span>Schedule a Call</span>
                    </a>

                    {/* WhatsApp Widget */}
                    <WhatsAppWidget />
                </>
            );
        };


        // Render the React application
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
